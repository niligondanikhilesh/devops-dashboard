apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      labels:
        app: dashboard
    spec:
      containers:
      - name: dashboard
        image: niknilig/devops-dashboard
        ports:
        - containerPort: 5000
        env:
        - name: REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: dashboard-config
              key: REDIS_HOST
        - name: APP_ENV
          valueFrom:
            configMapKeyRef:
              name: dashboard-config
              key: APP_ENV
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: dashboard-secret
              key: SECRET_KEY
